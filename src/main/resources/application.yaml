management:
  endpoints:
    shutdown:
      enabled: true
    web:
      exposure:
        include: "*"
  endpoint:
    env:
      show-values: always
    configprops:
      show-values: always

logging:
  level:
    "org.springframework.cloud.kubernetes": INFO
    "org.springframework.web": INFO
    "sing.app.query": INFO

spring:
  # query: classpath. Datasource: Secret mounted at /config (Helm) so `spring.config.import` binds
  # like normal YAML. Relying only on the K8s client PropertySource often leaves datasource.* empty.
  config:
    import:
      - query.yaml
      - optional:file:/config/datasource.yaml
  cloud:
    refresh:
      enabled: true
---
# Demo/example datasources for local or tests only (see src/test/resources)
spring:
  config:
    activate:
      on-profile: local
    import: optional:classpath:datasource.yaml
