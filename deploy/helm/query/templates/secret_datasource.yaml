kind: Secret
apiVersion: v1
metadata:
  name: {{ .Chart.Name }}-datasource
  labels:
    {{- include "chart-labels" . | nindent 4 }}
{{- with .Values.default_datasource_yaml }}
{{/* stringData: plain YAML; b64enc in `data` + newlines can break mounted /config/datasource.yaml */}}
stringData:
  datasource.yaml: |
{{ toYaml . | nindent 4 }}
{{- end }}
