suite: secret datasource
templates:
  - secret_datasource.yaml
tests:
  - it: meta data
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
      - equal:
          path: metadata.name
          value: query-datasource
      - matchRegex:
          path: metadata.labels['app.kubernetes.io/name']
          pattern: query
  - it: default
    asserts:
      - matchRegex:
          path: stringData['datasource.yaml']
          pattern: "in-memory"
      - matchRegex:
          path: stringData['datasource.yaml']
          pattern: "type: jdbc"
