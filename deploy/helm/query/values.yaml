deployment:

# replicaCount: 1              # set the deployment spec.replicas

  image:
    # Container image repository (without tag). Override for a private registry, retag, or derived build.
    repository: siakhooi/query
    tag: "0.21.0"
#   pullPolicy: IfNotPresent   # set the deployment container pullPolicy

  resources:                   # enable to set deployment container resources
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: "1"
      memory: 256Mi

  readinessProbe:
    enabled: true              # enable the readinessProbe
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 1
  livenessProbe:
    enabled: true              # enable the livenessProbe
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 1
  startupProbe:
    enabled: true              # enable the startupProbe
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 10

  securityContext:
#   pod:
#     runAsUser: 10002
#     runAsGroup: 10001
#     fsGroup: 10001
#     fsGroupChangePolicy: "OnRootMismatch"
    container:
      allowPrivilegeEscalation: false
      privileged: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

#podDisruptionBudget:   # default - not specified
#  maxUnavailable: 1    # mutual exclusive
#  minAvailable: 1      # mutual exclusive

default_datasource_yaml:
  datasource:
    connections:
      - name: "in-memory"
        type: "jdbc"
        url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
default_query_yaml:
  query:
    querysets:
      - name: user
        queries:
          - name: user
            connection: in-memory
            queryString: select user from user
